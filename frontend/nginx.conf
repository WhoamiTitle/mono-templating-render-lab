server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: неизвестные пути отдаём в index.html (Vue Router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # хешированные ассеты — кэшируем надолго
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
