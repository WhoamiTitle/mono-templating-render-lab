services:
  db:
    container_name: render-lab-db
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      - traefik.enable=false
    networks:
      - render-lab-network

  backend:
    container_name: render-lab-backend
    build:
      context: ./backend
      # host network: composer внутри билдера достаёт прокси на 127.0.0.1:1081
      network: host
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      CORS_ORIGINS: https://${APP_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER}
      PASSWORD_WORK_FACTOR: ${PASSWORD_WORK_FACTOR}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_PATH: ${COOKIE_PATH}
      COOKIE_HTTPONLY: ${COOKIE_HTTPONLY}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      # отрезаем /api перед передачей в бэкенд (роуты бэка живут в корне)
      - traefik.http.middlewares.render-lab-api-strip.stripprefix.prefixes=/api
      # нельзя забывать включать эти штуки
      - traefik.http.routers.render-lab-api.middlewares=redirect-to-https@file,unwww@file,render-lab-api-strip

      - traefik.http.routers.render-lab-api.entrypoints=websecure
      - traefik.http.routers.render-lab-api.tls.certresolver=mainResolver
      - traefik.http.services.render-lab-api.loadbalancer.server.port=8000
      - traefik.http.routers.render-lab-api.service=render-lab-api

      # тот же домен, что и фронт — приоритет задаём явно, иначе Traefik
      # считает его по длине rule и фронт-роутер перехватывает /api
      - traefik.http.routers.render-lab-api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.render-lab-api.priority=100
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik_net
      - render-lab-network

  frontend:
    container_name: render-lab-frontend
    build:
      context: ./frontend
      # host network: npm внутри билдера достаёт прокси на 127.0.0.1:1081
      network: host
      args:
        VITE_API_URL: /api
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      # нельзя забывать включать эти штуки
      - traefik.http.routers.render-lab.middlewares=redirect-to-https@file,unwww@file

      - traefik.http.routers.render-lab.entrypoints=websecure
      - traefik.http.routers.render-lab.tls.certresolver=mainResolver
      - traefik.http.services.render-lab.loadbalancer.server.port=80
      - traefik.http.routers.render-lab.service=render-lab

      - traefik.http.routers.render-lab.rule=Host(`${APP_DOMAIN}`) || Host(`www.${APP_DOMAIN}`)
      # ниже API-роутера: /api уходит в бэкенд, остальное во фронт
      - traefik.http.routers.render-lab.priority=1
    depends_on:
      - backend
    networks:
      - traefik_net
      - render-lab-network

networks:
  traefik_net:
    name: traefik_net
    external: true
  render-lab-network:
    name: render-lab-network
    external: false
